{% extends 'tasks/base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="card">
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, Delete</button>
        <a class="btn btn-secondary" href="{% url 'dashboard' %}">Cancel</a>
    </form>
</div>
{% endblock %}
