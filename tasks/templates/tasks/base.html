<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ToDo App{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f7fb;
            color: #1f2937;
        }

        header {
            background: #1f2937;
            color: #fff;
            padding: 12px 20px;
        }

        nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 6px;
        }

        nav a:hover {
            background: #374151;
        }

        main {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            padding: 18px;
            margin-bottom: 16px;
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }

        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary:hover { background: #374151; }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover { background: #047857; }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin-top: 4px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            padding: 10px 8px;
            font-size: 14px;
        }

        tr:hover { background: #f9fafb; }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .badge-high { background: #fee2e2; color: #dc2626; }
        .badge-medium { background: #fef3c7; color: #d97706; }
        .badge-low { background: #d1fae5; color: #059669; }
        .badge-default { background: #f3f4f6; color: #6b7280; }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'task_list' %}">Task List</a>
        <a href="{% url 'create_task' %}">Create Task</a>
        <a href="{% url 'categories' %}">Categories</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
